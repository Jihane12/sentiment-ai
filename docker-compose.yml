services:
  sentiment-ai:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: sentiment-ai

    ports:
      - "8081:8000"

    restart: unless-stopped

    networks:
      - cicd-network

    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  cicd-network:
    driver: bridge